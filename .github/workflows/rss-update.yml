name: RSS 数据更新

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 执行数据抓取
        run: npm run fetch
        env:
          TZ: 'Asia/Shanghai'

      - name: 提交并推送数据更新
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add public/data/
          git diff --cached --quiet || git commit -m "🔄 自动更新数据: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
