name: RSS 数据更新

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 执行数据抓取
        run: npm run fetch
        env:
          TZ: 'Asia/Shanghai'

      - name: 提交并推送数据更新
        id: commit
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add public/data/
          if git diff --cached --quiet; then
            echo "无数据变化，跳过提交"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "🔄 自动更新数据: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 触发 GitHub Pages 重新部署
        if: steps.commit.outputs.has_changes == 'true'
        run: |
          gh workflow run deploy-pages.yml --ref ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ github.token }}
